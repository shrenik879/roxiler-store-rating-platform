# render.yaml — Render Blueprint
# Defines both services so you can deploy with one click from the Render dashboard.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ──────────────────────────────────────────────────────────
  # Backend: Node.js / Express / Sequelize / SQLite
  # Deployed as a Docker web service (uses backend/Dockerfile)
  # ──────────────────────────────────────────────────────────
  - type: web
    name: store-rating-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free

    # Render injects PORT automatically; the app reads process.env.PORT via env.js
    # No start command needed — CMD in the Dockerfile handles seed + server

    healthCheckPath: /api/docs

    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production

      # PORT is automatically injected by Render (usually 10000).
      # Listed here for explicitness; Render's injected value takes precedence.
      - key: PORT
        value: 10000

      # ── Database ──────────────────────────────────────────
      - key: DB_DIALECT
        value: sqlite

      # Points SQLite to the persistent disk mounted at /app/data
      - key: DB_STORAGE
        value: /app/data/data.sqlite

      # ── JWT Secrets (CHANGE THESE) ────────────────────────
      # Generate with: openssl rand -hex 32
      - key: JWT_ACCESS_SECRET
        generateValue: true   # Render auto-generates a secure random value

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: BCRYPT_SALT_ROUNDS
        value: 10

      # ── CORS ──────────────────────────────────────────────
      # Set this to the actual frontend URL once it is deployed.
      # If using the Blueprint, Render can resolve service names:
      - key: CORS_ORIGIN
        fromService:
          name: store-rating-frontend
          type: web
          property: host
          # This inserts "https://<frontend-host>" automatically.
          # If auto-resolution fails, set manually in the dashboard.

      # ── Cookie Security ───────────────────────────────────
      - key: COOKIE_SECURE
        value: true

      # ── Redis (disabled — no Redis service needed) ────────
      - key: REDIS_ENABLED
        value: false

      # ── Rate Limiting ─────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000

      - key: RATE_LIMIT_MAX
        value: 300

      - key: AUTH_RATE_LIMIT_MAX
        value: 20

      # ── Seeding ───────────────────────────────────────────
      # SEED_DEMO=true populates demo stores, owners, users & ratings.
      # Great for evaluation/demo. Set to false for a clean production deploy.
      - key: SEED_DEMO
        value: true

      # ── Admin Account ─────────────────────────────────────
      - key: ADMIN_NAME
        value: System Administrator Account

      - key: ADMIN_EMAIL
        value: admin@storerating.com

      - key: ADMIN_PASSWORD
        value: Admin@1234   # Change this in the Render dashboard!

      - key: ADMIN_ADDRESS
        value: Head Office, Admin Street, City

  # ──────────────────────────────────────────────────────────
  # Frontend: React + Vite → built to static files → served by Render CDN
  # ──────────────────────────────────────────────────────────
  - type: web
    name: store-rating-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    rootDir: frontend
    region: oregon
    plan: free

    routes:
      # SPA fallback: all paths serve index.html (React Router handles routing)
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # VITE_API_URL is baked into the JS bundle at build time.
      # It must point to the backend service's public URL.
      - key: VITE_API_URL
        fromService:
          name: store-rating-backend
          type: web
          property: host
          # Render prepends https:// — result: https://<backend-host>
