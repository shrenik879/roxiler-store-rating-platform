# render.yaml — Render Blueprint
# One-click deployment: New → Blueprint → connect repo → Apply
# Docs: https://render.com/docs/blueprint-spec

services:
  # ──────────────────────────────────────────────────────────
  # Backend: Node.js / Express / Sequelize / SQLite
  # type: web + runtime: docker  →  Docker web service
  # ──────────────────────────────────────────────────────────
  - type: web
    name: store-rating-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free

    # Render injects PORT automatically (usually 10000).
    # The app reads process.env.PORT via env.js — no hardcoded port.
    # CMD in the Dockerfile handles seed + server start.
    healthCheckPath: /api/docs

    # NOTE: Persistent disk is a paid feature and is NOT used here.
    # SQLite is stored in the container's WORKDIR (/app/data.sqlite).
    # The seed script runs on every startup and restores demo data,
    # so a disk reset on redeploy is acceptable for evaluation purposes.

    envVars:
      - key: NODE_ENV
        value: production

      - key: DB_DIALECT
        value: sqlite

      # SQLite file path — stored in the container WORKDIR /app.
      # No persistent disk required; seed restores data on every start.
      - key: DB_STORAGE
        value: /app/data.sqlite

      # JWT secrets — auto-generated as 256-bit base64 values by Render.
      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: BCRYPT_SALT_ROUNDS
        value: 10

      # CORS_ORIGIN — set to the frontend's hostname.
      # fromService.type must be "web" because the frontend is
      # type: web + runtime: static (per Render Blueprint spec).
      - key: CORS_ORIGIN
        fromService:
          name: store-rating-frontend
          type: web
          property: host

      - key: COOKIE_SECURE
        value: true

      - key: REDIS_ENABLED
        value: false

      - key: RATE_LIMIT_WINDOW_MS
        value: 900000

      - key: RATE_LIMIT_MAX
        value: 300

      - key: AUTH_RATE_LIMIT_MAX
        value: 20

      # SEED_DEMO=true seeds demo stores, owners, users, and ratings.
      - key: SEED_DEMO
        value: true

      - key: ADMIN_NAME
        value: System Administrator Account

      - key: ADMIN_EMAIL
        value: admin@storerating.com

      - key: ADMIN_PASSWORD
        value: Admin@1234

      - key: ADMIN_ADDRESS
        value: Head Office, Admin Street, City

  # ──────────────────────────────────────────────────────────
  # Frontend: React + Vite → static files → Render global CDN
  # type: web + runtime: static  →  static site (per Render spec)
  # Static sites are served from Render's CDN with no region setting.
  # ──────────────────────────────────────────────────────────
  - type: web
    name: store-rating-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    routes:
      # SPA fallback — all paths serve index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # VITE_API_URL is baked into the JS bundle at build time.
      # fromService.type: web because the backend is type: web.
      - key: VITE_API_URL
        fromService:
          name: store-rating-backend
          type: web
          property: host
